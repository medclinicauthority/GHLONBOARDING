<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Onboarding — Med Clinic Authority</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#ede4d4;font-family:'Outfit',sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ede9e1;border-radius:4px}
    .fade{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .btn-gold{background:linear-gradient(135deg,#c9a96e,#b8924a);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s}
    .btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,169,110,.35)}
    .btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-ghost{background:transparent;color:#8888aa;border:1.5px solid #ede9e1;border-radius:10px;padding:14px 20px;font-size:14px;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s}
    .btn-ghost:hover{border-color:#c9a96e;color:#1a1a2e}
    .fi{width:100%;padding:12px 14px;border-radius:8px;border:1.5px solid #ede9e1;background:#ede4d4;color:#1a1a2e;font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
    .fi:focus{border-color:#c9a96e;background:#fff}
    textarea.fi{resize:vertical;line-height:1.6}
    .chip{padding:7px 14px;border-radius:20px;border:1.5px solid #ede9e1;background:#ede4d4;color:#666680;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
    .chip.on{border-color:#c9a96e;background:#fdf6ec;color:#1a1a2e;font-weight:500}
    .opt{padding:11px 14px;border-radius:8px;border:1.5px solid #ede9e1;background:#ede4d4;color:#666680;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;text-align:left;width:100%}
    .opt.on{border-color:#c9a96e;background:#fdf6ec;color:#1a1a2e;font-weight:500}
    .timebtn{padding:10px 8px;border-radius:8px;border:1.5px solid #ede9e1;background:#ede4d4;color:#666680;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;text-align:center;width:100%}
    .timebtn.on{border-color:#c9a96e;background:#fdf6ec;color:#1a1a2e;font-weight:500}
    .typecard{padding:16px 12px;border-radius:12px;border:1.5px solid #ede9e1;background:#ede4d4;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;text-align:center}
    .typecard.on{border-color:#c9a96e;background:#fdf6ec}
    em{font-style:italic;color:#c9a96e}
    @keyframes pop{from{opacity:0;transform:scale(.4) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    .pop{animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
    @media(max-width:600px){.card{padding:26px 18px !important}.g2,.g3{grid-template-columns:1fr !important}}
  </style>
</head>

async function submitGHL(f){
  if(!GHL_TOKEN)return;
  try{
    const r=await fetch('https://services.leadconnectorhq.com/contacts/',{method:'POST',headers:{'Authorization':`Bearer ${GHL_TOKEN}`,'Content-Type':'application/json','Version':'2021-07-28'},body:JSON.stringify({firstName:f.first,lastName:f.last,email:f.email,phone:f.phone,companyName:f.bizName,city:f.city,state:f.state,tags:['new-client',f.type==='med-spa'?'med-spa':'online-clinic','onboarding'],source:'Onboarding Form'})});
    const d=await r.json();
    if(d?.contact?.id)await fetch(`https://services.leadconnectorhq.com/contacts/${d.contact.id}/tags`,{method:'POST',headers:{'Authorization':`Bearer ${GHL_TOKEN}`,'Content-Type':'application/json','Version':'2021-07-28'},body:JSON.stringify({tags:['send-welcome-sequence']})});
  }catch(e){}
}

const LBL=({t})=><div style={{fontSize:11,fontWeight:600,color:'#8888aa',letterSpacing:.8,textTransform:'uppercase',marginBottom:8}}>{t}</div>;
const F=({label,value,onChange,placeholder,type='text'})=>(<div style={{marginBottom:16}}><LBL t={label}/><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className="fi"/></div>);
const TA=({label,value,onChange,placeholder})=>(<div style={{marginBottom:16}}><LBL t={label}/><textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} className="fi"/></div>);
const SH=({icon,title,sub})=>(<div style={{marginBottom:22}}><div style={{fontSize:20,color:'#c9a96e',marginBottom:7}}>{icon}</div><h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:25,fontWeight:500,color:'#1a1a2e',marginBottom:4}}>{title}</h2><p style={{fontSize:13,color:'#8888aa'}}>{sub}</p></div>);
const Chips=({items,val,tog})=>(<div style={{display:'flex',flexWrap:'wrap',gap:8}}>{items.map(s=><button key={s} className={`chip ${val.includes(s)?'on':''}`} onClick={()=>tog(s)}>{s}</button>)}</div>);
const Opts=({items,val,set,cols=2})=>(<div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:8}}>{items.map(o=><button key={o} className={`opt ${val===o?'on':''}`} onClick={()=>set(o)}>{o}</button>)}</div>);
const Nav=({onNext,onPrev,canNext})=>(<div style={{display:'flex',gap:12,marginTop:22}}><button className="btn-ghost" onClick={onPrev}>← Back</button><button className="btn-gold" style={{flex:1}} onClick={onNext} disabled={!canNext}>Continue →</button></div>);

function App(){
  const [step,setStep]=useState(0);
  const [sub,setSub]=useState(false);
  const [form,setForm]=useState({
    type:'med-spa',bizName:'',partner:'',registered:'',state:'',city:'',zip:'',address:'',hours:'',
    first:'',last:'',email:'',phone:'',website:'',instagram:'',facebook:'',tiktok:'',
    services:[],licensedStates:[],platform:'',payModel:'',
    colors:[],colorCustom:'',fonts:[],tagline:'',logoIdeas:'',brandEmotion:'',
    adSpend:'',currentAgency:'',targetCustomers:'',goals:'',
    routing:'',account:'',smsConsent:false,mktConsent:false,
    callTime:'',notes:''
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tog=(k,v)=>set(k,form[k].includes(v)?form[k].filter(x=>x!==v):[...form[k],v]);
  const isCl=form.type==='online-clinic';
  const go=()=>{setStep(s=>s+1);window.scrollTo(0,0);};
  const back=()=>{setStep(s=>s-1);window.scrollTo(0,0);};
  const submit=async()=>{setSub(true);await submitGHL(form);setSub(false);go();};
  const prog=step===0?0:Math.min((step/7)*100,100);

  return(
    <div style={{minHeight:'100vh',background:'#ede4d4',position:'relative',overflow:'hidden'}}>
      <div style={{position:'fixed',top:-200,right:-200,width:600,height:600,borderRadius:'50%',background:'radial-gradient(circle,#c9a96e18 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'fixed',bottom:-300,left:-200,width:700,height:700,borderRadius:'50%',background:'radial-gradient(circle,#7b68ee10 0%,transparent 70%)',pointerEvents:'none'}}/>

      <header style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 28px',zIndex:10,position:'relative'}}>
        <img src={LOGO} alt="Med Clinic Authority" style={{height:52,objectFit:'contain'}}/>
        {step>0&&step<8&&<span style={{fontSize:11,color:'#8888aa',fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>Step {step} of 7</span>}
      </header>

      {step>0&&step<8&&<div style={{height:2,background:'#ede9e1',zIndex:10,position:'relative'}}><div style={{height:'100%',background:'linear-gradient(90deg,#c9a96e,#e8c99e)',width:`${prog}%`,transition:'width .5s cubic-bezier(.4,0,.2,1)'}}/></div>}

      <div style={{display:'flex',justifyContent:'center',padding:'24px 20px 80px',position:'relative',zIndex:10}}>
        <div className="card fade" key={step} style={{background:'#fff',borderRadius:20,padding:'36px 40px',maxWidth:580,width:'100%',boxShadow:'0 4px 40px rgba(0,0,0,.06)'}}>

          {step===0&&<div style={{textAlign:'center'}}>
            <div style={{fontSize:34,color:'#c9a96e',marginBottom:12}}>✦</div>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:400,color:'#1a1a2e',lineHeight:1.2,marginBottom:12}}>Welcome to Your<br/><em>Growth Journey</em></h1>
            <p style={{fontSize:14,color:'#666680',lineHeight:1.7,marginBottom:24,maxWidth:400,margin:'0 auto 24px'}}>This intake takes under 5 minutes and gives us everything we need to build your brand and marketing strategy.</p>
            <div style={{fontSize:11,color:'#8888aa',marginBottom:10,fontWeight:600,letterSpacing:.5,textTransform:'uppercase'}}>Select your practice type</div>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24,maxWidth:380,margin:'0 auto 24px'}}>
              <button className={`typecard ${form.type==='med-spa'?'on':''}`} onClick={()=>set('type','med-spa')}>
                <div style={{fontSize:26,marginBottom:6}}>💆</div>
                <div style={{fontWeight:600,color:'#1a1a2e',fontSize:14,marginBottom:3}}>Med Spa</div>
                <div style={{fontSize:11,color:'#8888aa'}}>Aesthetic & wellness</div>
              </button>
              <button className={`typecard ${form.type==='online-clinic'?'on':''}`} onClick={()=>set('type','online-clinic')}>
                <div style={{fontSize:26,marginBottom:6}}>🏥</div>
                <div style={{fontWeight:600,color:'#1a1a2e',fontSize:14,marginBottom:3}}>Online Clinic</div>
                <div style={{fontSize:11,color:'#8888aa'}}>Virtual / telehealth</div>
              </button>
            </div>
            <button className="btn-gold" style={{width:'100%',maxWidth:300}} onClick={go}>Begin Onboarding →</button>
            <p style={{fontSize:11,color:'#aaa8bb',marginTop:12}}>100% secure & confidential</p>
          </div>}

          {step===1&&<div>
            <SH icon="◈" title="Business Information" sub={isCl?"Tell us about your online clinic":"Tell us about your med spa"}/>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <F label="Business Name *" value={form.bizName} onChange={v=>set('bizName',v)} placeholder={isCl?"Radiant Health Clinic":"Glow Med Spa"}/>
              <F label="Business Partner Name" value={form.partner} onChange={v=>set('partner',v)} placeholder="Partner (if applicable)"/>
            </div>
            <div style={{marginBottom:16}}>
              <LBL t="Is your business registered / incorporated? *"/>
              <Opts items={['Yes — LLC','Yes — S-Corp / C-Corp','Sole Proprietor','Not yet']} val={form.registered} set={v=>set('registered',v)}/>
            </div>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <F label="State *" value={form.state} onChange={v=>set('state',v)} placeholder="FL"/>
              <F label="City *" value={form.city} onChange={v=>set('city',v)} placeholder="Miami"/>
            </div>
            {!isCl&&<><F label="Street Address" value={form.address} onChange={v=>set('address',v)} placeholder="123 Beauty Blvd, Suite 200"/><F label="Business Hours" value={form.hours} onChange={v=>set('hours',v)} placeholder="Mon–Fri 9am–6pm, Sat 10am–4pm"/></>}
            <Nav onNext={go} onPrev={back} canNext={form.bizName&&form.state&&form.city&&form.registered}/>
          </div>}

          {step===2&&<div>
            <SH icon="◉" title="Contact Details" sub="Who's the main point of contact?"/>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <F label="First Name *" value={form.first} onChange={v=>set('first',v)} placeholder="Sarah"/>
              <F label="Last Name *" value={form.last} onChange={v=>set('last',v)} placeholder="Johnson"/>
            </div>
            <F label="Email Address *" type="email" value={form.email} onChange={v=>set('email',v)} placeholder="sarah@yourpractice.com"/>
            <F label="Phone Number *" type="tel" value={form.phone} onChange={v=>set('phone',v)} placeholder="+1 (305) 555-0100"/>
            <F label="Current Website (if any)" value={form.website} onChange={v=>set('website',v)} placeholder="https://yoursite.com"/>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <F label="Instagram Handle" value={form.instagram} onChange={v=>set('instagram',v)} placeholder="@yourhandle"/>
              <F label="Facebook Page" value={form.facebook} onChange={v=>set('facebook',v)} placeholder="facebook.com/yourpage"/>
            </div>
            <Nav onNext={go} onPrev={back} canNext={form.first&&form.last&&form.email&&form.phone}/>
          </div>}

          {step===3&&<div>
            <SH icon="◇" title={isCl?"Clinic Services":"Spa Services"} sub={isCl?"What services does your online clinic offer?":"What treatments do you offer?"}/>
            <div style={{marginBottom:20}}>
              <LBL t="Services Offered *"/>
              <Chips items={isCl?CLINIC_SVCS:SPA_SVCS} val={form.services} tog={v=>tog('services',v)}/>
            </div>
            {isCl&&<>
              <div style={{marginBottom:20}}>
                <LBL t="States You're Licensed to Practice In *"/>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {US_STATES.map(s=><button key={s} className={`chip ${form.licensedStates.includes(s)?'on':''}`} style={{padding:'5px 9px',fontSize:11}} onClick={()=>tog('licensedStates',s)}>{s}</button>)}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <LBL t="Payment Model"/>
                <Opts items={['Cash Pay Only','Insurance + Cash Pay','Subscription / Membership','Insurance Only']} val={form.payModel} set={v=>set('payModel',v)}/>
              </div>
              <F label="Telehealth Platform (if any)" value={form.platform} onChange={v=>set('platform',v)} placeholder="e.g. Doxy.me, Spruce, Simple Practice, Zoom"/>
            </>}
            <Nav onNext={go} onPrev={back} canNext={form.services.length>0}/>
          </div>}

          {step===4&&<div>
            <SH icon="✦" title="Brand Vision" sub="Help us understand the look and feel you want"/>
            <div style={{marginBottom:18}}>
              <LBL t="Favorite Color Palette(s) *"/>
              <Chips items={COLORS_LIST} val={form.colors} tog={v=>tog('colors',v)}/>
            </div>
            {form.colors.includes('Custom (describe below)')&&<F label="Describe your custom colors" value={form.colorCustom} onChange={v=>set('colorCustom',v)} placeholder="e.g. Deep forest green with warm gold accents"/>}
            <div style={{marginBottom:18}}>
              <LBL t="Font Style Preference"/>
              <Chips items={FONTS_LIST} val={form.fonts} tog={v=>tog('fonts',v)}/>
            </div>
            <F label="Tagline / Slogan (optional)" value={form.tagline} onChange={v=>set('tagline',v)} placeholder="e.g. 'Look Good. Feel Amazing.' — leave blank if none"/>
            <TA label="Logo Ideas or Visual Inspiration" value={form.logoIdeas} onChange={v=>set('logoIdeas',v)} placeholder="Describe what you'd like — shapes, icons, reference brands..."/>
            <TA label="What message / emotion should your brand convey?" value={form.brandEmotion} onChange={v=>set('brandEmotion',v)} placeholder="e.g. Trustworthy, luxurious, approachable, clinical yet warm..."/>
            <Nav onNext={go} onPrev={back} canNext={form.colors.length>0}/>
          </div>}

          {step===5&&<div>
            <SH icon="◈" title="Marketing & Goals" sub="Help us understand where you're starting from"/>
            <div style={{marginBottom:20}}>
              <LBL t="Current Monthly Ad Spend *"/>
              <Opts items={AD_SPEND} val={form.adSpend} set={v=>set('adSpend',v)}/>
            </div>
            <F label="Current Marketing Agency (if any)" value={form.currentAgency} onChange={v=>set('currentAgency',v)} placeholder="None / or agency name"/>
            <TA label="Who are your target clients / patients? *" value={form.targetCustomers} onChange={v=>set('targetCustomers',v)} placeholder="e.g. Women 30–55 in South Florida seeking weight loss & anti-aging solutions"/>
            <TA label="Short & long term business goals *" value={form.goals} onChange={v=>set('goals',v)} placeholder="Short: e.g. 20 new patients/month&#10;Long: e.g. expand to 5 states, reach $2M revenue"/>
            <Nav onNext={go} onPrev={back} canNext={form.adSpend&&form.goals&&form.targetCustomers}/>
          </div>}

          {step===6&&<div>
            <SH icon="◈" title="Business Setup" sub="Final details to get your account ready"/>
            <div style={{background:'#fdf6ec',border:'1px solid #f0d9b5',borderRadius:10,padding:'13px 15px',marginBottom:20,fontSize:13,color:'#7a5c2e',lineHeight:1.6}}>
              ⚠️ Our team will request your <strong>Certificate of Incorporation</strong> via secure email after your strategy call. Bank details below are for billing setup only.
            </div>
            <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <F label="Bank Routing Number" value={form.routing} onChange={v=>set('routing',v)} placeholder="021000021"/>
              <F label="Bank Account Number" type="password" value={form.account} onChange={v=>set('account',v)} placeholder="Account number"/>
            </div>
            <TA label="Anything else we should know?" value={form.notes} onChange={v=>set('notes',v)} placeholder="Special requests, questions, important context..."/>
            <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:10}}>
              <label style={{display:'flex',gap:10,alignItems:'flex-start',cursor:'pointer'}}>
                <input type="checkbox" checked={form.smsConsent} onChange={e=>set('smsConsent',e.target.checked)} style={{marginTop:3,accentColor:'#c9a96e'}}/>
                <span style={{fontSize:12,color:'#8888aa',lineHeight:1.5}}>I consent to receive non-marketing text messages from <strong>Med Clinic Authority</strong> about my account & services. Msg & data rates may apply. Reply STOP to opt out.</span>
              </label>
              <label style={{display:'flex',gap:10,alignItems:'flex-start',cursor:'pointer'}}>
                <input type="checkbox" checked={form.mktConsent} onChange={e=>set('mktConsent',e.target.checked)} style={{marginTop:3,accentColor:'#c9a96e'}}/>
                <span style={{fontSize:12,color:'#8888aa',lineHeight:1.5}}>I consent to receive marketing & promotional messages from <strong>Med Clinic Authority</strong>.</span>
              </label>
            </div>
            <Nav onNext={go} onPrev={back} canNext={form.smsConsent}/>
          </div>}

          {step===7&&<div>
            <SH icon="◉" title="Schedule Your Strategy Call" sub="Pick a time — we'll come prepared with your custom growth plan"/>
            <div style={{fontSize:13,color:'#666680',lineHeight:1.6,marginBottom:20,padding:'12px 14px',background:'#fdf6ec',borderRadius:8,borderLeft:'3px solid #c9a96e'}}>
              Your dedicated strategist will review everything and arrive with a custom roadmap for your {isCl?'online clinic':'med spa'}.
            </div>
            <div style={{marginBottom:20}}>
              <LBL t="Preferred Time Slot *"/>
              <div className="g3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {TIMES.map(t=><button key={t} className={`timebtn ${form.callTime===t?'on':''}`} onClick={()=>set('callTime',t)}>{t}</button>)}
              </div>
            </div>
            <button className="btn-gold" style={{width:'100%'}} disabled={!form.callTime||sub} onClick={submit}>
              {sub?'Submitting...':'Complete Onboarding ✦'}
            </button>
            <button className="btn-ghost" style={{width:'100%',marginTop:10}} onClick={back}>← Back</button>
          </div>}

          {step===8&&<div style={{textAlign:'center'}}>
            <div className="pop" style={{fontSize:44,color:'#c9a96e',marginBottom:12}}>✦</div>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:400,color:'#1a1a2e',lineHeight:1.2,marginBottom:12}}>You're All Set,<br/><em>{form.first||'Friend'}!</em></h1>
            <p style={{fontSize:14,color:'#666680',lineHeight:1.7,marginBottom:20}}>Your onboarding is complete. Check your inbox — our team will reach out within 24 hours to confirm your strategy call.</p>
            <div style={{background:'#ede4d4',borderRadius:12,padding:'4px 20px',textAlign:'left',marginBottom:18}}>
              {[['Practice',form.bizName],['Type',isCl?'Online Clinic':'Med Spa'],['Contact',`${form.first} ${form.last}`],['Email',form.email],['Strategy Call',form.callTime]].filter(([,v])=>v?.trim()).map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #f0ece6'}}>
                  <span style={{fontSize:13,color:'#8888aa'}}>{k}</span>
                  <span style={{fontSize:13,color:'#1a1a2e',fontWeight:500,textAlign:'right',maxWidth:'60%'}}>{v}</span>
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:'#aaa8bb'}}>Questions? Email <strong>hello@medclinicauthority.com</strong></p>
          </div>}

        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
