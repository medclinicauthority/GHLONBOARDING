<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Onboarding — MedClinics Authority</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#ffffff;font-family:"Montserrat",sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#c4a882;border-radius:4px}
    .fade{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .btn-p{background:linear-gradient(135deg,#7a6248,#5c4832);color:#f0e6d2;border:none;border-radius:2px;padding:15px 32px;font-size:11px;font-weight:600;font-family:"Montserrat",sans-serif;cursor:pointer;transition:all .25s;letter-spacing:2.5px;text-transform:uppercase;width:100%}
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(90,68,48,.3)}
    .btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-s{background:transparent;color:#7a6248;border:1px solid #c4a882;border-radius:2px;padding:13px 24px;font-size:10px;font-weight:600;font-family:"Montserrat",sans-serif;cursor:pointer;transition:all .2s;letter-spacing:2px;text-transform:uppercase}
    .btn-s:hover{background:#7a6248;color:#f0e6d2}
    .fi{width:100%;padding:13px 4px;border:none;border-bottom:1px solid #ddd0b8;background:transparent;color:#1e1810;font-size:13px;font-family:"Montserrat",sans-serif;outline:none;transition:all .2s;letter-spacing:.3px}
    .fi:focus{border-bottom-color:#7a6248}
    .fi::placeholder{color:#c0aa88;font-size:12px}
    textarea.fi{resize:vertical;line-height:1.7;border:1px solid #ddd0b8;border-radius:2px;padding:12px 14px;background:#fdfaf6}
    textarea.fi:focus{border-color:#7a6248;background:#fff}
    .chip{padding:8px 16px;border-radius:1px;border:1px solid #ddd0b8;background:#fdfaf6;color:#5c4832;font-size:10px;cursor:pointer;font-family:"Montserrat",sans-serif;transition:all .15s;white-space:nowrap;letter-spacing:1px;font-weight:500;text-transform:uppercase}
    .chip.on{border-color:#7a6248;background:#7a6248;color:#f0e6d2}
    .chip:hover:not(.on){border-color:#7a6248;color:#7a6248}
    .opt{padding:12px 16px;border-radius:1px;border:1px solid #ddd0b8;background:#fdfaf6;color:#5c4832;font-size:11px;cursor:pointer;font-family:"Montserrat",sans-serif;transition:all .15s;text-align:left;width:100%;letter-spacing:.6px;font-weight:500}
    .opt.on{border-color:#7a6248;background:#7a6248;color:#f0e6d2}
    .opt:hover:not(.on){border-color:#7a6248;color:#7a6248}
    .tb{padding:11px 6px;border-radius:1px;border:1px solid #ddd0b8;background:#fdfaf6;color:#5c4832;font-size:10px;cursor:pointer;font-family:"Montserrat",sans-serif;transition:all .15s;text-align:center;width:100%;letter-spacing:.5px;font-weight:500}
    .tb.on{border-color:#7a6248;background:#7a6248;color:#f0e6d2}
    @keyframes pop{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
    .pop{animation:pop .7s cubic-bezier(.34,1.56,.64,1) both}
    @media(max-width:600px){.card{padding:28px 20px !important}.g2{grid-template-columns:1fr !important}.g3{grid-template-columns:1fr 1fr !important}}
  </style>
</head>

async function save(f){
  if(!GHL)return;
  try{
    const r=await fetch("https://services.leadconnectorhq.com/contacts/",{method:"POST",headers:{"Authorization":"Bearer "+GHL,"Content-Type":"application/json","Version":"2021-07-28"},body:JSON.stringify({firstName:f.first,lastName:f.last,email:f.email,phone:f.phone,companyName:f.biz,city:f.city,state:f.state,tags:["new-client",f.type==="med-spa"?"med-spa":"online-clinic","onboarding"],source:"Onboarding Form"})});
    const d=await r.json();
    if(d&&d.contact&&d.contact.id){await fetch("https://services.leadconnectorhq.com/contacts/"+d.contact.id+"/tags",{method:"POST",headers:{"Authorization":"Bearer "+GHL,"Content-Type":"application/json","Version":"2021-07-28"},body:JSON.stringify({tags:["send-welcome-sequence"]})});}
  }catch(e){}
}

const L=({t})=><div style={{fontSize:9,fontWeight:600,color:"#9a7e5a",letterSpacing:2.5,textTransform:"uppercase",marginBottom:10}}>{t}</div>;

function Field({label,value,onChange,placeholder,type}){
  type=type||"text";
  return(
    <div style={{marginBottom:22}}>
      <L t={label}/>
      <input type={type} value={value} onChange={function(e){onChange(e.target.value);}} placeholder={placeholder} className="fi"/>
      <div style={{height:1,background:"linear-gradient(90deg,#ddd0b8,transparent)"}}/>
    </div>
  );
}

function TArea({label,value,onChange,placeholder}){
  return(
    <div style={{marginBottom:22}}>
      <L t={label}/>
      <textarea value={value} onChange={function(e){onChange(e.target.value);}} placeholder={placeholder} rows={3} className="fi"/>
    </div>
  );
}

function SH({n,title,sub}){
  return(
    <div style={{marginBottom:28}}>
      <div style={{fontSize:9,letterSpacing:3,color:"#9a7e5a",textTransform:"uppercase",marginBottom:12,fontWeight:600}}>Step {n} of 7</div>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:"#1e1810",marginBottom:10,lineHeight:1.2}}>{title}</h2>
      <div style={{height:1,width:52,background:"linear-gradient(90deg,#7a6248,transparent)",marginBottom:10}}/>
      <p style={{fontSize:11,color:"#7a6248",letterSpacing:.4,lineHeight:1.7}}>{sub}</p>
    </div>
  );
}

function Chips({items,val,tog}){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      {items.map(function(s){return <button key={s} className={"chip"+(val.includes(s)?" on":"")} onClick={function(){tog(s);}}>{s}</button>;})}
    </div>
  );
}

function Opts({items,val,set,cols}){
  cols=cols||2;
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat("+cols+",1fr)",gap:8}}>
      {items.map(function(o){return <button key={o} className={"opt"+(val===o?" on":"")} onClick={function(){set(o);}}>{o}</button>;})}
    </div>
  );
}

function Nav({onNext,onPrev,ok}){
  return(
    <div style={{display:"flex",gap:12,marginTop:28}}>
      <button className="btn-s" onClick={onPrev}>Back</button>
      <button className="btn-p" style={{flex:1}} onClick={onNext} disabled={!ok}>Continue</button>
    </div>
  );
}

function App(){
  const [s,setS]=useState(0);
  const [sub,setSub]=useState(false);

    type:"med-spa",biz:"",partner:"",reg:"",state:"",city:"",addr:"",hrs:"",
    first:"",last:"",email:"",phone:"",web:"",ig:"",fb:"",
    svcs:[],lstates:[],platform:"",pay:"",

    spend:"",agency:"",target:"",goals:"",
    routing:"",acct:"",sms:false,mkt:false,call:"",notes:""
  });

  function set(k,v){setF(function(p){var n={};Object.keys(p).forEach(function(key){n[key]=p[key];});n[k]=v;return n;});}
  function tog(k,v){var cur=f[k];set(k,cur.includes(v)?cur.filter(function(x){return x!==v;}):[].concat(cur,[v]));}

  var cl=f.type==="online-clinic";
  function go(){setS(function(p){return p+1;});window.scrollTo(0,0);}
  function back(){setS(function(p){return p-1;});window.scrollTo(0,0);}
  async function submit(){setSub(true);await save(f);setSub(false);go();}
  var prog=s===0?0:Math.min((s/7)*100,100);

  return(
    <div style={{minHeight:"100vh",background:"#ffffff"}}>

      <header style={{padding:"16px 36px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f0e8d8"}}>

        {s>0&&s<8&&(

            <div style={{width:100,height:1.5,background:"#f0e8d8"}}>
              <div style={{height:"100%",background:"linear-gradient(90deg,#7a6248,#c4a882)",width:prog+"%",transition:"width .6s ease"}}/>
            </div>
          </div>
        )}
      </header>

      <div style={{display:"flex",justifyContent:"center",padding:"40px 20px 80px"}}>
        <div className="card fade" key={s} style={{background:"#ffffff",borderRadius:2,padding:"52px 56px",maxWidth:600,width:"100%",boxShadow:"0 1px 40px rgba(100,80,50,.06),0 0 0 1px #f0e8d8"}}>

          {s===0&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,letterSpacing:4,color:"#9a7e5a",textTransform:"uppercase",marginBottom:18,fontWeight:600}}>Client Onboarding</div>
              <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:300,color:"#1e1810",lineHeight:1.15,marginBottom:8}}>
                Welcome to<br/><em style={{fontWeight:400}}>MedClinics Authority</em>
              </h1>
              <div style={{height:1,background:"linear-gradient(90deg,transparent,#c4a882,transparent)",margin:"18px auto",width:180}}/>
              <p style={{fontSize:12,color:"#5c4832",lineHeight:1.9,marginBottom:34,letterSpacing:.3}}>
                This intake takes under 5 minutes and gives us everything<br/>we need to build your brand and growth strategy.
              </p>
              <div style={{fontSize:9,letterSpacing:3,color:"#9a7e5a",textTransform:"uppercase",marginBottom:16,fontWeight:600}}>Select your practice type</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:34,maxWidth:420,margin:"0 auto 34px"}}>
                <button
                  onClick={function(){set("type","med-spa");}}
                  style={{
                    padding:"28px 20px",border:"1px solid",borderRadius:2,cursor:"pointer",textAlign:"center",transition:"all .3s",
                    borderColor:f.type==="med-spa"?"#7a6248":"#ddd0b8",
                    background:f.type==="med-spa"?"#faf4ec":"#fdfaf8",
                    boxShadow:f.type==="med-spa"?"0 4px 20px rgba(122,98,72,.12)":"none"
                  }}>
                  <div style={{marginBottom:14}}><MedSpaIcon active={f.type==="med-spa"}/></div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:400,color:"#1e1810",marginBottom:5}}>Med Spa</div>
                  <div style={{fontSize:9,color:f.type==="med-spa"?"#7a6248":"#b8a07a",letterSpacing:2,textTransform:"uppercase",fontWeight:600,transition:"color .3s"}}>Aesthetic & Wellness</div>
                  {f.type==="med-spa"&&<div style={{marginTop:12,height:2,background:"linear-gradient(90deg,#7a6248,#c4a882)",borderRadius:1}}/>}
                </button>
                <button
                  onClick={function(){set("type","online-clinic");}}
                  style={{
                    padding:"28px 20px",border:"1px solid",borderRadius:2,cursor:"pointer",textAlign:"center",transition:"all .3s",
                    borderColor:f.type==="online-clinic"?"#7a6248":"#ddd0b8",
                    background:f.type==="online-clinic"?"#faf4ec":"#fdfaf8",
                    boxShadow:f.type==="online-clinic"?"0 4px 20px rgba(122,98,72,.12)":"none"
                  }}>
                  <div style={{marginBottom:14}}><ClinicIcon active={f.type==="online-clinic"}/></div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:400,color:"#1e1810",marginBottom:5}}>Online Clinic</div>
                  <div style={{fontSize:9,color:f.type==="online-clinic"?"#7a6248":"#b8a07a",letterSpacing:2,textTransform:"uppercase",fontWeight:600,transition:"color .3s"}}>Virtual & Telehealth</div>
                  {f.type==="online-clinic"&&<div style={{marginTop:12,height:2,background:"linear-gradient(90deg,#7a6248,#c4a882)",borderRadius:1}}/>}
                </button>
              </div>
              <button className="btn-p" style={{maxWidth:300,display:"block",margin:"0 auto"}} onClick={go}>Begin Onboarding</button>
              <div style={{height:1,background:"linear-gradient(90deg,transparent,#ddd0b8,transparent)",margin:"22px auto",width:150}}/>
              <p style={{fontSize:9,color:"#c0aa88",letterSpacing:2,textTransform:"uppercase",fontWeight:500}}>100% Secure & Confidential</p>
            </div>
          )}

          {s===1&&(
            <div>
              <SH n={1} title={cl?"Your Online Clinic":"Your Med Spa"} sub={cl?"Tell us about your clinic, its structure, and location":"Tell us about your practice and where it operates"}/>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <Field label="Business Name *" value={f.biz} onChange={function(v){set("biz",v);}} placeholder={cl?"Radiant Health Clinic":"Glow Med Spa"}/>
                <Field label="Business Partner Name" value={f.partner} onChange={function(v){set("partner",v);}} placeholder="Partner (if applicable)"/>
              </div>
              <div style={{marginBottom:22}}><L t="Is your business incorporated / registered? *"/><Opts items={["Yes — LLC","Yes — S-Corp / C-Corp","Sole Proprietor","Not yet"]} val={f.reg} set={function(v){set("reg",v);}}/></div>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <Field label="State *" value={f.state} onChange={function(v){set("state",v);}} placeholder="FL"/>
                <Field label="City *" value={f.city} onChange={function(v){set("city",v);}} placeholder="Miami"/>
              </div>
              {!cl&&<div><Field label="Street Address" value={f.addr} onChange={function(v){set("addr",v);}} placeholder="123 Beauty Blvd, Suite 200"/><Field label="Business Hours" value={f.hrs} onChange={function(v){set("hrs",v);}} placeholder="Mon–Fri 9am–6pm, Sat 10am–4pm"/></div>}
              <Nav onNext={go} onPrev={back} ok={f.biz&&f.state&&f.city&&f.reg}/>
            </div>
          )}

          {s===2&&(
            <div>
              <SH n={2} title="Contact Details" sub="Who is the primary point of contact for this account?"/>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <Field label="First Name *" value={f.first} onChange={function(v){set("first",v);}} placeholder="Sarah"/>
                <Field label="Last Name *" value={f.last} onChange={function(v){set("last",v);}} placeholder="Johnson"/>
              </div>
              <Field label="Email Address *" type="email" value={f.email} onChange={function(v){set("email",v);}} placeholder="sarah@yourpractice.com"/>
              <Field label="Phone Number *" type="tel" value={f.phone} onChange={function(v){set("phone",v);}} placeholder="+1 (305) 555-0100"/>
              <Field label="Current Website (if any)" value={f.web} onChange={function(v){set("web",v);}} placeholder="https://yoursite.com"/>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <Field label="Instagram Handle" value={f.ig} onChange={function(v){set("ig",v);}} placeholder="@yourhandle"/>
                <Field label="Facebook Page" value={f.fb} onChange={function(v){set("fb",v);}} placeholder="facebook.com/yourpage"/>
              </div>
              <Nav onNext={go} onPrev={back} ok={f.first&&f.last&&f.email&&f.phone}/>
            </div>
          )}

          {s===3&&(
            <div>
              <SH n={3} title={cl?"Clinic Services":"Spa Services"} sub={cl?"Select all services your online clinic provides":"Select all treatments you currently offer"}/>
              <div style={{marginBottom:24}}><L t="Services Offered *"/><Chips items={cl?CLINIC:SPA} val={f.svcs} tog={function(v){tog("svcs",v);}}/></div>
              {cl&&<div>
                <div style={{marginBottom:24}}><L t="States Licensed to Practice In *"/><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{STATES.map(function(st){return <button key={st} className={"chip"+(f.lstates.includes(st)?" on":"")} style={{padding:"5px 10px",fontSize:10}} onClick={function(){tog("lstates",st);}}>{st}</button>;})}</div></div>
                <div style={{marginBottom:22}}><L t="Payment Model"/><Opts items={["Cash Pay Only","Insurance + Cash Pay","Subscription / Membership","Insurance Only"]} val={f.pay} set={function(v){set("pay",v);}}/></div>
                <Field label="Telehealth Platform (if any)" value={f.platform} onChange={function(v){set("platform",v);}} placeholder="e.g. Doxy.me, Spruce, Simple Practice, Zoom"/>
              </div>}
              <Nav onNext={go} onPrev={back} ok={f.svcs.length>0}/>
            </div>
          )}

          {s===4&&(
            <div>
              <SH n={4} title="Brand Vision" sub="Help us understand the aesthetic and identity you envision"/>
              <div style={{marginBottom:22}}><L t="Favorite Color Palette(s) *"/><Chips items={CLRS} val={f.colors} tog={function(v){tog("colors",v);}}/></div>
              {f.colors.includes("Custom (describe below)")&&<Field label="Describe your custom colors" value={f.cc} onChange={function(v){set("cc",v);}} placeholder="e.g. Deep forest green with warm gold accents..."/>}
              <div style={{marginBottom:22}}><L t="Font Style Preference"/><Chips items={FNTS} val={f.fonts} tog={function(v){tog("fonts",v);}}/></div>
              <Field label="Tagline / Slogan (if any)" value={f.tag} onChange={function(v){set("tag",v);}} placeholder="e.g. Look Good. Feel Amazing. — leave blank if none"/>
              <TArea label="Logo Ideas or Visual Inspiration" value={f.logo} onChange={function(v){set("logo",v);}} placeholder="Describe shapes, icons, reference brands you admire..."/>
              <TArea label="What message / emotion should your brand convey?" value={f.feel} onChange={function(v){set("feel",v);}} placeholder="e.g. Trustworthy, luxurious, approachable, authoritative..."/>
              <Nav onNext={go} onPrev={back} ok={f.colors.length>0}/>
            </div>
          )}

          {s===5&&(
            <div>
              <SH n={5} title="Marketing & Goals" sub="Help us understand your current position and where you want to go"/>
              <div style={{marginBottom:22}}><L t="Current Monthly Ad Spend *"/><Opts items={SPEND} val={f.spend} set={function(v){set("spend",v);}}/></div>
              <Field label="Current Marketing Agency (if any)" value={f.agency} onChange={function(v){set("agency",v);}} placeholder="None / Agency name"/>
              <TArea label="Who are your target clients / patients? *" value={f.target} onChange={function(v){set("target",v);}} placeholder="e.g. Women 30-55 in South Florida seeking weight loss and anti-aging solutions"/>
              <TArea label="Short and long term business goals *" value={f.goals} onChange={function(v){set("goals",v);}} placeholder="Short term: 20 new patients/month. Long term: expand to 5 states, $2M revenue"/>
              <Nav onNext={go} onPrev={back} ok={f.spend&&f.goals&&f.target}/>
            </div>
          )}

          {s===6&&(
            <div>
              <SH n={6} title="Business Setup" sub="Final administrative details to prepare your account"/>
              <div style={{background:"#fdf8f0",border:"1px solid #e8d8b8",borderLeft:"2px solid #7a6248",padding:"14px 18px",marginBottom:24,fontSize:11,color:"#5c4832",lineHeight:1.8}}>
                <strong>Please note:</strong> Our team will request your Certificate of Incorporation via secure email after your strategy call. Banking details are used solely for billing setup.
              </div>
              <div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <Field label="Bank Routing Number" value={f.routing} onChange={function(v){set("routing",v);}} placeholder="021000021"/>
                <Field label="Bank Account Number" type="password" value={f.acct} onChange={function(v){set("acct",v);}} placeholder="Account number"/>
              </div>
              <TArea label="Anything else we should know?" value={f.notes} onChange={function(v){set("notes",v);}} placeholder="Special requests, questions, important context..."/>
              <div style={{height:1,background:"linear-gradient(90deg,transparent,#ddd0b8,transparent)",margin:"20px 0"}}/>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <label style={{display:"flex",gap:12,alignItems:"flex-start",cursor:"pointer"}}>
                  <input type="checkbox" checked={f.sms} onChange={function(e){set("sms",e.target.checked);}} style={{marginTop:3,accentColor:"#7a6248"}}/>
                  <span style={{fontSize:11,color:"#7a6248",lineHeight:1.7}}>I consent to receive non-marketing text messages from <strong>MedClinics Authority</strong> about my account and services. Msg and data rates may apply. Reply STOP to opt out.</span>
                </label>
                <label style={{display:"flex",gap:12,alignItems:"flex-start",cursor:"pointer"}}>
                  <input type="checkbox" checked={f.mkt} onChange={function(e){set("mkt",e.target.checked);}} style={{marginTop:3,accentColor:"#7a6248"}}/>
                  <span style={{fontSize:11,color:"#7a6248",lineHeight:1.7}}>I consent to receive marketing and promotional messages from <strong>MedClinics Authority</strong>.</span>
                </label>
              </div>
              <Nav onNext={go} onPrev={back} ok={f.sms}/>
            </div>
          )}

          {s===7&&(
            <div>
              <SH n={7} title="Strategy Call" sub="Select your preferred time — your strategist will arrive with a custom growth plan"/>
              <div style={{background:"#fdf8f0",border:"1px solid #e8d8b8",borderLeft:"2px solid #7a6248",padding:"14px 18px",marginBottom:24,fontSize:11,color:"#5c4832",lineHeight:1.8}}>
                Your dedicated strategist will review everything and bring a tailored roadmap for your {cl?"online clinic":"med spa"}.
              </div>
              <div style={{marginBottom:24}}>
                <L t="Preferred Time Slot *"/>
                <div className="g3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {TIMES.map(function(t){return <button key={t} className={"tb"+(f.call===t?" on":"")} onClick={function(){set("call",t);}}>{t}</button>;})}
                </div>
              </div>
              <button className="btn-p" disabled={!f.call||sub} onClick={submit}>{sub?"Submitting...":"Complete Onboarding"}</button>
              <div style={{marginTop:10}}><button className="btn-s" style={{width:"100%"}} onClick={back}>Back</button></div>
            </div>
          )}

          {s===8&&(
            <div style={{textAlign:"center"}}>
              <div className="pop" style={{marginBottom:20}}>
                <svg width="58" height="58" viewBox="0 0 58 58" fill="none">
                  <circle cx="29" cy="29" r="27.5" stroke="#7a6248" strokeWidth="1"/>
                  <path d="M17 29L25 37L41 21" stroke="#7a6248" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              <div style={{fontSize:9,letterSpacing:4,color:"#9a7e5a",textTransform:"uppercase",marginBottom:14,fontWeight:600}}>Onboarding Complete</div>
              <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:300,color:"#1e1810",lineHeight:1.2,marginBottom:10}}>
                Welcome Aboard,<br/><em>{f.first||"Friend"}</em>
              </h1>
              <div style={{height:1,background:"linear-gradient(90deg,transparent,#7a6248,transparent)",margin:"16px auto",width:140}}/>
              <p style={{fontSize:12,color:"#5c4832",lineHeight:1.9,marginBottom:26}}>Your onboarding is complete. Our team will reach out within 24 hours to confirm your strategy call.</p>
              <div style={{background:"#fdf8f0",border:"1px solid #e8d8b8",padding:"4px 24px",textAlign:"left",marginBottom:22}}>
                {[["Practice",f.biz],["Type",cl?"Online Clinic":"Med Spa"],["Contact",f.first+" "+f.last],["Email",f.email],["Strategy Call",f.call]].filter(function(x){return x[1]&&x[1].trim();}).map(function(x){return(
                  <div key={x[0]} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid #eddcc0"}}>
                    <span style={{fontSize:9,color:"#9a7e5a",letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>{x[0]}</span>
                    <span style={{fontSize:12,color:"#1e1810",fontWeight:500,textAlign:"right",maxWidth:"55%"}}>{x[1]}</span>
                  </div>
                );})}
              </div>
              <p style={{fontSize:9,color:"#c0aa88",letterSpacing:2,textTransform:"uppercase"}}>Questions: <strong style={{color:"#7a6248"}}>hello@medclinicauthority.com</strong></p>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
